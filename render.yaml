# Render Blueprint for CV Tailor App
# Deploys both FastAPI backend and React frontend
# Docs: https://render.com/docs/blueprint-spec

services:
  # Backend Service
  - type: web
    name: cv-tailor-backend
    env: python
    rootDir: server
    buildCommand: pip install --prefer-binary -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port 10000
    envVars:
      - key: PORT
        value: 10000
      - key: PYTHONUNBUFFERED
        value: 1
    plan: free
    autoDeploy: true

  # Frontend Service
  - type: web
    name: cv-tailor-frontend
    env: node
    rootDir: client
    buildCommand: npm install --legacy-peer-deps && npm run build
    startCommand: npm run preview -- --host 0.0.0.0 --port 10001
    envVars:
      - key: VITE_API_BASE_URL
        value: https://api-backend.ravichudgar.com
    plan: free
    autoDeploy: true
