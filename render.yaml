# Render Blueprint for CV Tailor FastAPI App
# Docs: https://render.com/docs/blueprint-spec

services:
  - type: web
    name: cv-tailor-server
    env: python
    buildCommand: pip install -r server/requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port 10000
    envVars:
      - key: PORT
        value: 10000
    plan: free
    autoDeploy: true
    rootDir: server
