version: '3.8'

services:
  backend:
    build:
      context: ./server
      dockerfile: Dockerfile.prod
    container_name: cv-tailor-backend-prod
    restart: always
    ports:
      - "8001:8001"
    environment:
      - PYTHONUNBUFFERED=1
      - DEBUG=False
    volumes:
      - ./server/data:/app/data
      - ./server/uploads:/app/uploads
    networks:
      - cv-tailor-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  frontend:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: cv-tailor-frontend-prod
    restart: always
    ports:
      - "5173:5173"
    environment:
      - VITE_API_BASE_URL=/api
    depends_on:
      - backend
    networks:
      - cv-tailor-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:5173"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  cv-tailor-network:
    driver: bridge

volumes:
  backend-data:
    driver: local
  backend-uploads:
    driver: local
